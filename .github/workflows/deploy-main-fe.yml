# Push to `main_fe`: frontend only — test, build, deploy Hosting + Firestore/Storage rules.
# Secrets/vars: same as before on Environment `first env` (FIREBASE_TOKEN, VITE_FIREBASE_*).
name: Deploy (main_fe - frontend)

on:
  push:
    branches: [main_fe]
  workflow_dispatch:

concurrency:
  group: deploy-main-fe
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: vibejobber

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: first env
    permissions:
      contents: read
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN || vars.FIREBASE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION || vars.VITE_FIREBASE_FUNCTIONS_REGION }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Check FIREBASE_TOKEN
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "::error::FIREBASE_TOKEN is empty. Add it to Environment \`first env\`:"
            echo "  Settings → Environments → first env → Environment secrets → New secret → name: FIREBASE_TOKEN"
            echo "  Value: output of \`firebase login:ci\` (or a CI token with deploy access to project ${FIREBASE_PROJECT_ID})"
            exit 1
          fi

      - name: Deploy Hosting + Firestore/Storage rules
        working-directory: frontend
        run: |
          npx --yes firebase-tools@latest deploy --only "hosting,firestore:rules,storage" \
            --project "$FIREBASE_PROJECT_ID" --non-interactive
