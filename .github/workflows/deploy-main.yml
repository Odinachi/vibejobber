# Deploy when `main` is updated: Firebase Hosting + rules (frontend/), then Cloud Functions (cloud_functions/).
#
# GitHub → Settings → Secrets and variables → Actions, add:
#   FIREBASE_TOKEN        — from `firebase login:ci` (or a service account with deploy rights)
#   VITE_FIREBASE_*       — same as production `frontend/.env` (build-time; see frontend/.env.example)
# Optional: VITE_FIREBASE_MEASUREMENT_ID, VITE_FIREBASE_FUNCTIONS_REGION
# To use a different Firebase project id, change `FIREBASE_PROJECT_ID` in the `env` block below.
name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: vibejobber

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Deploy Hosting + Firestore/Storage rules
        working-directory: frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx --yes firebase-tools@latest deploy --only "hosting,firestore:rules,storage" \
            --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Set up Python (cloud_functions)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cloud_functions/functions/requirements.txt

      - name: Test cloud_functions (pytest)
        working-directory: cloud_functions
        run: |
          python -m pip install -U pip
          pip install -r functions/requirements.txt -r functions/requirements-dev.txt
          python -m pytest

      - name: Deploy Firebase Cloud Functions (cloud_functions/)
        working-directory: cloud_functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx --yes firebase-tools@latest deploy --only functions --project "$FIREBASE_PROJECT_ID" --non-interactive
