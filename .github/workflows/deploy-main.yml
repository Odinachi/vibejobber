# Deploy when `main` is updated: Firebase Hosting + rules (frontend/), then Cloud Functions (cloud_functions/).
#
# Store deploy credentials on the GitHub **Environment** named `first env` (Settings → Environments),
# or the job will not see them: repository secrets are separate from environment secrets/variables.
#   FIREBASE_TOKEN  — required for `firebase deploy`. Create with `firebase login:ci` and add it as
#   an **Environment secret** (preferred) or **Environment variable** on `first env` (name must be
#   exactly `FIREBASE_TOKEN`). If missing, the workflow fails with "Failed to authenticate".
#   VITE_FIREBASE_*  — build-time; same as `frontend/.env` / `.env.example`
# Optional: VITE_FIREBASE_MEASUREMENT_ID, VITE_FIREBASE_FUNCTIONS_REGION
# Non-secret config can use Environment **variables** (see `vars` fallbacks in the build step).
# To use a different Firebase project id, change `FIREBASE_PROJECT_ID` in the `env` block below.
name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: vibejobber

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Required so secrets/variables from the "first env" environment are available to this job.
    environment: first env
    permissions:
      contents: read
    env:
      # Secrets and vars both checked — token is often stored as an Environment *secret* on `first env`.
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN || vars.FIREBASE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION || vars.VITE_FIREBASE_FUNCTIONS_REGION }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Check FIREBASE_TOKEN
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "::error::FIREBASE_TOKEN is empty. Add it to Environment \`first env\`:"
            echo "  Settings → Environments → first env → Environment secrets → New secret → name: FIREBASE_TOKEN"
            echo "  Value: output of \`firebase login:ci\` (or a CI token with deploy access to project ${FIREBASE_PROJECT_ID})"
            exit 1
          fi

      - name: Deploy Hosting + Firestore/Storage rules
        working-directory: frontend
        run: |
          npx --yes firebase-tools@latest deploy --only "hosting,firestore:rules,storage" \
            --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Set up Python (cloud_functions)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cloud_functions/functions/requirements.txt

      - name: Test cloud_functions (pytest)
        working-directory: cloud_functions
        run: |
          python -m pip install -U pip
          pip install -r functions/requirements.txt -r functions/requirements-dev.txt
          python -m pytest

      - name: Deploy Firebase Cloud Functions (cloud_functions/)
        working-directory: cloud_functions
        run: |
          npx --yes firebase-tools@latest deploy --only functions --project "$FIREBASE_PROJECT_ID" --non-interactive
